version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: workflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -i PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator:
    build: ./orchestrator
    working_dir: /usr/src/app
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/orders_db
      - REDIS_URL=redis://redis:6379
      - WORKFLOW_EVENTS_CHANNEL=workflow_events
      - NODE_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      payment-service:
        condition: service_started
      inventory-service:
        condition: service_started
      shipping-service:
        condition: service_started
      notification-service:
        condition: service_started

  payment-service:
    build: ./services/payment-service
    ports:
      - "4001:4001"

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "4002:4002"

  shipping-service:
    build: ./services/shipping-service
    ports:
      - "4003:4003"

  notification-service:
    build: ./services/notification-service
    ports:
      - "4004:4004"

  frontend-ui:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - orchestrator

volumes:
  db-data:
