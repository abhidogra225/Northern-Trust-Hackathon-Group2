version: '3.8'
services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  orchestrator:
    build: ./orchestrator
    working_dir: /usr/src/app
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/orders_db
      - NODE_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      - db
      - payment-service
      - inventory-service
      - shipping-service
      - notification-service

  payment-service:
    build: ./services/payment-service
    ports:
      - "4001:4001"

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "4002:4002"

  shipping-service:
    build: ./services/shipping-service
    ports:
      - "4003:4003"

  notification-service:
    build: ./services/notification-service
    ports:
      - "4004:4004"

volumes:
  db-data:
